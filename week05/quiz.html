<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML/CSS Quiz | WDD130</title>
    <meta name="description" content="Quiz form for W05 Code-along Activity in WDD130.">
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <header>
        <h1>HTML and CSS Quiz</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>General Knowledge</legend>
                <div class="form-item">
                    <label for="q1">1. What does the "M" in HTML stand for?</label>
                    <input type="text" id="q1" name="q1" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>CSS Concepts</legend>
                <div class="form-item">
                    <label for="q2">2. In your own words, what is the purpose of CSS?</label>
                    <textarea id="q2" name="q2" rows="4" placeholder="Type your answer here..." required></textarea>
                </div>

                <div class="form-item">
                    <label for="q3">3. Which of these is a CSS framework?</label>
                    <select id="q3" name="q3" required>
                        <option value="" selected disabled>Choose One ...</option>
                        <option value="bootstrap">Bootstrap</option>
                        <option value="python">Python</option>
                        <option value="sql">SQL</option>
                    </select>
                </div>

                <div class="form-item">
                    <label for="q4">4. How many 'margin' properties can an element have?</label>
                    <input type="number" id="q4" name="q4" required>
                </div>
            </fieldset>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer>
        <p>©2026 | Quiz Form Activity | WDD130</p>
    </footer>
</body>
</html>
