<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips | Whitewater Rafting Adventures</title>
    <meta name="description" content="Explore our available rafting trips: Grand Canyon, Salmon River, and Snake River expeditions.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="trips-intro">
            <h1>Our River Expeditions</h1>
            <p>Ready for adrenaline? <a href="contact.html" class="cta-contact">Book Your Trip Today</a></p>
        </section>

        <section class="trips-grid">
            <figure class="trip-card">
                <img src="images/hero.jpg" alt="Grand Canyon Adventure">
                <figcaption>
                    <h2>Grand Canyon Adventure</h2>
                    <p>A 7-day world-class expedition through breathtaking canyons.</p>
                </figcaption>
            </figure>

            <figure class="trip-card">
                <img src="images/client.jpg" alt="Salmon River Run">
                <figcaption>
                    <h2>Salmon River Float</h2>
                    <p>Perfect for families who want a mix of rapids and beaches.</p>
                </figcaption>
            </figure>

            <figure class="trip-card">
                <img src="images/hero.jpg" alt="Snake River Sprint">
                <figcaption>
                    <h2>Snake River Sprint</h2>
                    <p>A high-intensity day trip for seeking a quick adrenaline rush.</p>
                </figcaption>
            </figure>
        </section>

        <section class="table-container">
            <h2>Trips Summary Table</h2>
            <table>
                <thead>
                    <tr>
                        <th>Trip Name</th>
                        <th>Duration</th>
                        <th>Difficulty</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Grand Canyon</td>
                        <td>7 Days</td>
                        <td>Advanced</td>
                    </tr>
                    <tr>
                        <td>Salmon River</td>
                        <td>3 Days</td>
                        <td>Intermediate</td>
                    </tr>
                    <tr>
                        <td>Snake River</td>
                        <td>1 Day</td>
                        <td>Expert</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas | Bolivia</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="LinkedIn"></a>
        </nav>
    </footer>
</body>
</html>
