<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo">
        <nav>
            <a href="../index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <div class="contact-container">
            <section class="contact-info">
                <h1>Contact Us</h1>
                <p><strong>Address:</strong> Av. Heroínas, Cochabamba, Bolivia</p>
                <p><strong>Email:</strong> info@raftingadventure.com</p>
                <p><strong>Phone:</strong> +591 4 1234567</p>
                
                <div class="map-container">
                    <img src="images/map.png" alt="Map Location">
                </div>
            </section>

            <section class="contact-form">
                <h2>Send Us a Message</h2>
                <form>
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="full-name" required>

                    <label for="user-email">Email Address</label>
                    <input type="email" id="user-email" name="user-email" required>

                    <label>Inquiry Type</label>
                    <div style="margin: 10px 0;">
                        <input type="radio" id="general" name="type" value="general">
                        <label style="display: inline; font-weight: normal;" for="general">General</label>
                        <input type="radio" id="booking" name="type" value="booking">
                        <label style="display: inline; font-weight: normal;" for="booking">Booking</label>
                    </div>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5"></textarea>

                    <button type="submit">Submit Request</button>
                </form>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas</p>
    </footer>
</body>
</html>
