<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <section style="padding: 50px; text-align: center;">
            <h1>Contact Us</h1>
            <p>Address: Av. Heroínas, Cochabamba, Bolivia</p>
            <div style="max-width: 1000px; margin: 0 auto; overflow: hidden; border-radius: 10px;">
                <img src="https://maps.googleapis.com/..." alt="Map" style="width: 100%;">
            </div>
        </section>

        <section class="trips-grid">
            <form style="max-width: 600px; margin: 0 auto; text-align: left; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ddd;">
                <label>Name: <input type="text" name="user_name" style="width: 100%; margin-bottom: 15px;"></label>
                <label>Email: <input type="email" name="user_email" style="width: 100%; margin-bottom: 15px;"></label>
                <fieldset style="margin-bottom: 15px;">
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" name="purpose" value="general"> General Inquiry</label><br>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation</label>
                </fieldset>
                <label>Message: <textarea name="message" style="width: 100%; height: 100px;"></textarea></label>
                <button type="submit" style="background: var(--secondary-color); color: white; border: none; padding: 10px 20px; cursor: pointer; margin-top: 10px;">Submit Request</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas | Cochabamba, Bolivia</p>
        <div class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="FB"></a>
            <a href="#"><img src="images/instagram.png" alt="IG"></a>
            <a href="#"><img src="images/linkedin.png" alt="LI"></a>
        </div>
    </footer>
</body>
</html>
