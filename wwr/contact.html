<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Whitewater Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Company Logo">
        <nav>
            <a href="../index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="contact-grid">
            <div class="contact-info">
                <h1>Visit Our Office</h1>
                <p><strong>Address:</strong> Av. Heroínas, Cochabamba, Bolivia</p>
                <p><strong>Email:</strong> info@raftingadventure.com</p>
                <p><strong>Phone:</strong> +591 4 1234567</p>
                
                <div class="map-container">
                    <img src="images/map.png" alt="Office Location Map">
                </div>
            </div>

            <div class="contact-form-container">
                <h2>Send Us a Message</h2>
                <form action="#">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="6" required></textarea>

                    <button type="submit" class="btn-submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Project | Rich Kevin Panozo Vargas</p>
        <div class="social-links">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.png" alt="Instagram">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.png" alt="LinkedIn">
            </a>
        </div>
    </footer>
</body>
</html>
