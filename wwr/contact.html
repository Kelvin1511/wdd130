<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Dry Water Rafting - Rich Kevin Panozo</title>
    <meta name="author" content="Rich Kevin Panozo Vargas">
    <meta name="description" content="Contact Dry Water Rafting for white water adventures in Cochabamba, Bolivia.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Dry Water Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        
        <section class="contact-details">
            <h2>Contact Information</h2>
            <p>Address: Av. Heroínas, Cochabamba, Bolivia</p>
            <p>Phone: +591 70000000</p>
            <p>Email: info@drywaterrafting.com</p>
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15228.32435161048!2d-66.1568!3d-17.3935!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2sbo!4v1712000000000" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <section class="team">
            <h2>Our Expert Team</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/profile.jpg" alt="Rich Kevin Panozo">
                    <figcaption>Rich Kevin Panozo Vargas - CEO</figcaption>
                </figure>
                <figure>
                    <img src="images/client.jpg" alt="Sarah Johnson">
                    <figcaption>Sarah Johnson - Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/hero.jpg" alt="Marco Polo">
                    <figcaption>Marco Polo - Specialist</figcaption>
                </figure>
            </div>
        </section>

        <section class="form-container">
            <h2>Send us a Message</h2>
            <form action="#" method="post">
                <div class="form-item">
                    <label for="user_name">Name:</label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>

                <div class="form-item">
                    <label for="user_email">Email:</label>
                    <input type="email" id="user_email" name="user_email" required>
                </div>

                <fieldset>
                    <legend>Purpose of Message</legend>
                    <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation</label>
                    <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Suggestion</label>
                </fieldset>

                <div class="form-item">
                    <label for="message">Message:</label>
                    <textarea id="message" name="user_message" rows="4"></textarea>
                </div>

                <div class="form-item">
                    <label for="subscribe">
                        <input type="checkbox" id="subscribe" name="subscribe"> Subscribe to newsletter
                    </label>
                </div>

                <button type="submit">Submit Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Rafting Project | Rich Kevin Panozo Vargas | Cochabamba, Bolivia</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram Icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.png" alt="LinkedIn Icon"></a>
        </nav>
    </footer>
</body>
</html>
